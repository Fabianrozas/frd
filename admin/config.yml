backend:
  name: git-gateway
  branch: main

media_folder: "proyectos"
public_folder: "proyectos"

collections:
  - name: "proyectos"
    label: "Proyectos"
    files:
      - name: "lista"
        label: "Lista de proyectos"
        file: "proyectos.json"
        fields:
          - name: "items"
            label: "Proyectos"
            widget: "list"
            fields:
              - { label: "ID (nombre de carpeta, sin espacios)", name: "id", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Descripción", name: "descripcion", widget: "text" }
              - { label: "Imagen de portada", name: "imagen", widget: "image" }
              - label: "Galería"
                name: "galeria"
                widget: "list"
                field: { label: "Imagen", name: "imagen", widget: "image" }
